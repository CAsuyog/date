<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Siddhi ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff758f; --dark-pink: #ff4d6d; --bg: #fff0f3; }
        body, html { margin: 0; padding: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        .layout { display: flex; align-items: center; gap: 20px; width: 95%; max-width: 1100px; padding: 20px; flex-wrap: wrap; justify-content: center; }
        .photos { display: flex; flex-direction: column; gap: 15px; width: 160px; }
        .photo { background: white; padding: 6px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transform: rotate(-3deg); transition: 0.3s; }
        .photo img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; }
        .photo:nth-child(even) { transform: rotate(3deg); }
        .card { background: white; border-radius: 25px; padding: 35px; flex: 1; max-width: 450px; text-align: center; box-shadow: 0 15px 40px rgba(255, 117, 143, 0.2); border: 2px solid #ffccd5; z-index: 10; }
        h1 { font-family: 'Dancing Script', cursive; color: var(--dark-pink); font-size: 1.3rem; line-height: 1.6; margin-bottom: 20px; }
        .btns { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 15px; border-radius: 50px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #yes { background: linear-gradient(45deg, var(--pink), var(--dark-pink)); color: white; }
        #no { background: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6; }
        #success { display: none; text-align: center; }
        .hearts { position: absolute; pointer-events: none; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @media (max-width: 768px) { .photos { flex-direction: row; width: 100%; justify-content: center; } .photos.right { order: -1; } .photo img { height: 140px; width: 100px; } }
    </style>
</head>
<body>
    <div class="layout" id="main">
        <div class="photos">
            <div class="photo"><img src="img1.jpg"></div>
            <div class="photo"><img src="img2.jpg"></div>
        </div>
        <div class="card">
            <h1>Hi Siddhi... I don’t know if this is a little bold, but I’ve really enjoyed talking to you lately. There’s something about you that just feels different 😊 So I was thinking, would you like to go out with me this Sunday? ❤️</h1>
            <div class="btns">
                <button id="yes">Yes, I'd love to!</button>
                <button id="no">Maybe next time</button>
            </div>
        </div>
        <div class="photos right">
            <div class="photo"><img src="img3.jpg"></div>
            <div class="photo"><img src="img4.jpeg"></div>

            
        </div>
    </div>
    <div id="success">
        <div class="card" style="margin: 0 auto;">
            <h1 style="font-size: 2.5rem;">I Promise it will be your Best date! ❤️</h1>
            <p>I'll text you soon, Siddhi.</p>
        </div>
    </div>
    <form id="f" action="https://formspree.io/f/xvgzlowj" method="POST" style="display:none;"><input name="msg" value="Siddhi said YES!"></form>
    <script>
        const y=document.getElementById('yes'), n=document.getElementById('no'), m=document.getElementById('main'), s=document.getElementById('success');
        let sc=1;
        function move() { sc+=0.3; y.style.transform=`scale(${sc})`; n.style.position='fixed'; n.style.left=Math.random()*80+'vw'; n.style.top=Math.random()*80+'vh'; n.innerText="Are you sure? 🥺"; }
        n.onclick=move; n.ontouchstart=(e)=>{e.preventDefault(); move();};
        y.onclick=()=>{ fetch(document.getElementById('f').action,{method:'POST',body:new FormData(document.getElementById('f')),headers:{'Accept':'application/json'}}); m.style.display='none'; s.style.display='block'; for(let i=0;i<50;i++){ setTimeout(()=>{ const h=document.createElement('div'); h.className='hearts'; h.innerHTML='❤️'; h.style.left=Math.random()*100+'vw'; h.style.top='-5vh'; document.body.appendChild(h); },i*100);}};
    </script>
</body>
</html>
